<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHARMEGIC - LocalStorage Tozalash</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        h1 { color: #1a1a1a; margin-bottom: 10px; font-size: 24px; }
        p { color: #666; margin-bottom: 30px; line-height: 1.6; }
        .data-list {
            text-align: left;
            background: #f8f9fa;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
            max-height: 200px;
            overflow-y: auto;
        }
        .data-list h3 {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .data-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
            font-size: 14px;
        }
        .data-item:last-child { border-bottom: none; }
        .key { color: #333; font-weight: 500; }
        .value { color: #C40000; font-weight: 600; }
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 12px;
        }
        .btn-danger {
            background: #C40000;
            color: white;
        }
        .btn-danger:hover {
            background: #a00000;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(196,0,0,0.3);
        }
        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }
        .btn-secondary:hover {
            background: #d0d0d0;
        }
        .success {
            display: none;
            background: #e8f5e9;
            color: #2e7d32;
            padding: 16px;
            border-radius: 8px;
            margin-top: 20px;
        }
        .success.show { display: block; }
        .warning {
            background: #fff3e0;
            color: #ef6c00;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🗑️</div>
        <h1>LocalStorage Tozalash</h1>
        <p>
            Bu sahifa brauzerda saqlangan barcha PHARMEGIC ma'lumotlarni 
            (savat, buyurtmalar, mahsulotlar keshi) o'chiradi.
        </p>
        
        <div class="warning">
            ⚠️ Bu amalni qaytarib bo'lmaydi!
        </div>

        <div class="data-list" id="dataList">
            <h3>Topilgan ma'lumotlar:</h3>
            <div id="itemsList"></div>
        </div>

        <button class="btn btn-danger" onclick="clearAllData()">
            🗑️ Hammasini o'chirish
        </button>
        <button class="btn btn-secondary" onclick="window.close()">
            ❌ Yopish
        </button>

        <div class="success" id="successMsg">
            ✅ Barcha ma'lumotlar muvaffaqiyatli o'chirildi!<br>
            Sahifani yopishingiz mumkin.
        </div>
    </div>

    <script>
        // PHARMEGICga tegishli localStorage kalitlari
        const PHARMEGIC_KEYS = [
            'pharmegic_products',
            'pharmegic_orders',
            'pharmegic_cart',
            'pharmegic_sourcing',
            'pharmegic_admin_token',
            'lastSyncTime',
            'products_updated',
            'products_last_update',
            'lang'
        ];

        function showData() {
            const list = document.getElementById('itemsList');
            let hasData = false;
            
            PHARMEGIC_KEYS.forEach(key => {
                const data = localStorage.getItem(key);
                if (data) {
                    hasData = true;
                    const size = new Blob([data]).size;
                    list.innerHTML += `
                        <div class="data-item">
                            <span class="key">${key}</span>
                            <span class="value">${size} bayt</span>
                        </div>
                    `;
                }
            });

            if (!hasData) {
                list.innerHTML = '<div class="data-item"><span>Hech qanday ma\'lumot topilmadi</span></div>';
            }
        }

        function clearAllData() {
            if (!confirm('Haqiqatan ham barcha ma\'lumotlarni o\'chirmoqchimisiz?')) {
                return;
            }

            let cleared = 0;
            PHARMEGIC_KEYS.forEach(key => {
                if (localStorage.getItem(key) !== null) {
                    localStorage.removeItem(key);
                    cleared++;
                }
            });

            // Boshqa pharmegic bilan bog'liq narsalarni ham tekshirish
            for (let i = localStorage.length - 1; i >= 0; i--) {
                const key = localStorage.key(i);
                if (key && key.startsWith('pharmegic')) {
                    localStorage.removeItem(key);
                    cleared++;
                }
            }

            document.getElementById('successMsg').classList.add('show');
            document.getElementById('itemsList').innerHTML = 
                `<div class="data-item"><span>🗑️ ${cleared} ta kalit o'chirildi</span></div>`;
            
            console.log('✅ LocalStorage tozalandi:', cleared, 'ta kalit');
        }

        // Sahifa yuklanganda ma'lumotlarni ko'rsatish
        showData();
    </script>
</body>
</html>
